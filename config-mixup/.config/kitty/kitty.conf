# ~/.config/kitty/kitty.conf
# ──────────────── TOKYO NIGHT x WAYBAR ────────────────

# -------- Fontes --------
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.5

# -------- Opacité / transparence --------
background_opacity         0.88
dynamic_background_opacity yes

# -------- Marges / padding / bordures --------
window_padding_width 14
window_margin_width  0

border_width  3
border_color  #7aa2f7
active_tab_background   #bb9af7

# -------- Comportement --------
confirm_os_window_close 0
enable_audio_bell       no

# -------- Scrolling --------
scrollback_lines 10000
scrollback_pager less

# -------- Raccourcis --------
map ctrl+shift+enter new_window
map ctrl+shift+w     close_window
map ctrl+shift+t     new_tab

# ------------------------------------------------------------------
# Cursor trail (effet de traînée du curseur)
# ------------------------------------------------------------------
cursor_trail 12
cursor_trail_decay 0.18 0.55
cursor_trail_start_threshold 2
cursor_trail_color #bb9af7

# ------------------------------------------------------------------
# Rendu texte
# ------------------------------------------------------------------
text_antialiasing subpixel
text_composition_strategy 0

# ------------------------------------------------------------------
# Palette des 16 couleurs (Tokyo Night)
# ------------------------------------------------------------------

foreground            #a9b1d6
background            #24283b
selection_foreground  #c0caf5
selection_background  #364a82

cursor                #c0caf5
cursor_text_color     #24283b

# Noir
color0  #1d202f
color8  #414868

# Rouge
color1  #f7768e
color9  #f7768e

# Vert
color2  #9ece6a
color10 #9ece6a

# Jaune
color3  #e0af68
color11 #e0af68

# Bleu
color4  #7aa2f7
color12 #7aa2f7

# Magenta / Mauve
color5  #bb9af7
color13 #bb9af7

# Cyan
color6  #7dcfff
color14 #7dcfff

# Blanc
color7  #c0caf5
color15 #c0caf5
# ------------------------------------------------------------------
# Style des Onglets (Tabs)
# ------------------------------------------------------------------
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #16161e
active_tab_background   #7aa2f7
active_tab_font_style   bold
inactive_tab_foreground #545c7e
inactive_tab_background #1f2335
inactive_tab_font_style normal
tab_bar_background      #15161e

map ctrl+alt+y send_text all yt-dlp
